name: Deploy website folder to S3 and refresh CloudFront

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      S3_BUCKET: YOUR_BUCKET_NAME
      CLOUDFRONT_DISTRIBUTION_ID: YOUR_DISTRIBUTION_ID

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::YOUR_AWS_ACCOUNT_ID:role/github-actions-s3-cloudfront-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync website folder to S3
        run: |
          aws s3 sync website/ s3://${S3_BUCKET} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${CLOUDFRONT_DISTRIBUTION_ID} \
            --paths "/*"
